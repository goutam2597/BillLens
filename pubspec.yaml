name: billlens
description: Smart Receipt Scanner AI App for freelancers and small business owners.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.4.4

  # Local Database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Local Preferences
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Image Handling
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  dotted_border: ^2.1.0
  pinput: ^5.0.0
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Utilities
  uuid: ^4.5.1
  logger: ^2.4.0
  dartz: ^0.10.1
  permission_handler: ^11.3.1
  open_filex: ^4.5.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  device_info_plus: ^10.1.2
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # PDF/CSV
  pdf: ^3.11.1
  printing: ^5.13.2
  csv: ^6.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  injectable_generator: ^2.6.2
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
