name: billlens
description: Smart Receipt Scanner AI App for freelancers and small business owners.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.1.0

  # Navigation
  go_router: ^17.3.0

  # Dependency Injection (compatible with Dart 3.11 / Flutter 3.41.6)
  get_it: ^9.2.1
  injectable: ^2.3.2

  # Local Database
  drift: ^2.34.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Local Preferences
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5

  # Networking
  dio: ^5.10.0

  # Image Handling
  camera: ^0.12.0+1
  image_picker: ^1.2.3
  image_cropper: ^12.2.1
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  lottie: ^3.5.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  dotted_border: ^3.1.0
  pinput: ^6.0.2
  intl: ^0.20.3

  # Connectivity
  connectivity_plus: ^7.2.0

  # Ads
  google_mobile_ads: ^9.0.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # Notifications
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_auth: ^6.5.4
  google_sign_in: ^6.3.0
  flutter_local_notifications: ^22.0.1

  # Utilities
  uuid: ^4.5.3
  logger: ^2.7.0
  dartz: ^0.10.1
  permission_handler: ^12.0.3
  open_filex: ^4.7.0
  share_plus: ^13.2.0
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  local_auth: ^3.0.2
  flutter_secure_storage: ^10.3.1

  # PDF/CSV
  pdf: ^3.13.0
  printing: ^5.15.0
  csv: ^8.0.0

  # Image processing for box crop
  image: ^4.5.4

  cupertino_icons: ^1.0.9
  google_mlkit_text_recognition: ^0.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.6.2
  drift_dev: ^2.34.0
  build_runner: ^2.15.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
